<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantine - Paiement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#FF5A00',
                        brandLight: '#FFF0E6',
                        surface: '#FDFDFD',
                        card: '#FFFFFF',
                        textDark: '#1A1A1A',
                        textMuted: '#7A7A7A'
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '2.5rem',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-textDark antialiased min-h-screen pb-24">
    <!-- Auth Guard -->
    <script src="assets/js/app.js"></script>
    <script>checkAuthGuard();</script>

    <!-- En-tête -->
    <header class="pt-8 px-6 pb-6 z-10 flex items-center border-b border-gray-100 bg-white">
        <button class="w-10 h-10 rounded-full bg-surface shadow-sm flex items-center justify-center text-textDark" onclick="window.history.back()">
            <i class="fa-solid fa-chevron-left text-sm"></i>
        </button>
        <h1 class="text-xl font-bold ml-6">Paiement</h1>
    </header>

    <main class="px-6 pt-6 space-y-8">
        
        <!-- Modes de paiement -->
        <section>
            <h2 class="text-lg font-bold mb-4">Mode de paiement</h2>
            <div class="space-y-3">
                <!-- Solde Employé -->
                <label class="flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border-2 border-brand cursor-pointer transition relative overflow-hidden group">
                    <div class="absolute inset-0 bg-brand opacity-5 pointer-events-none"></div>
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-full bg-brandLight flex items-center justify-center text-brand">
                            <i class="fa-solid fa-wallet"></i>
                        </div>
                        <div class="ml-4">
                            <span class="font-bold text-sm block text-brand">Solde Cantine</span>
                            <span class="text-xs text-textMuted">Disponible : 45,00 €</span>
                        </div>
                    </div>
                    <div class="w-6 h-6 rounded-full border-4 border-brand flex items-center justify-center bg-white">
                        <div class="w-2 h-2 rounded-full bg-brand"></div>
                    </div>
                </label>

                <!-- Carte Bancaire (supprimée) -->
                <!-- Facture Entreprise -->
                <label class="flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-100 cursor-pointer hover:border-brandLight transition">
                    <div class="flex items-center">
                        <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                            <i class="fa-solid fa-file-invoice"></i>
                        </div>
                        <div class="ml-4">
                            <span class="font-bold text-sm block text-textDark">Facture Mensuelle</span>
                            <span class="text-xs text-textMuted">Prélevé sur salaire</span>
                        </div>
                    </div>
                    <div class="w-6 h-6 rounded-full border-2 border-gray-200"></div>
                </label>
            </div>
        </section>

        <!-- Adresse ou infos livraison -->
        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Mode de réception</h2>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <button class="bg-brand text-white font-bold py-3 rounded-xl border border-brand transition shadow-sm">Sur place</button>
                <button class="bg-white text-textMuted font-bold py-3 rounded-xl border border-gray-100 hover:border-brandLight transition">Livraison Bureau</button>
            </div>

            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 flex items-start">
                <div class="mt-1 text-brand text-lg">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <div class="ml-4 flex-1">
                    <h3 class="font-bold text-sm">Réfectoire principal</h3>
                    <p class="text-xs text-textMuted mt-1 leading-relaxed">Réservation pour demain midi. Présentez votre QR Code.</p>
                </div>
            </div>
        </section>

        <!-- Récapitulatif -->
        <section class="bg-white p-6 rounded-3xl shadow-card">
            <h2 class="text-sm font-bold uppercase tracking-widest text-textMuted mb-4">Récapitulatif</h2>
            <div class="space-y-3 text-sm font-medium">
                <div class="flex justify-between text-textMuted">
                    <span>Menu Crispy (x1)</span>
                    <span>12,90 €</span>
                </div>
                <div class="flex justify-between text-textMuted">
                    <span>Nuggets (x1)</span>
                    <span>3,50 €</span>
                </div>
                <div class="pt-3 border-t border-gray-100 flex justify-between">
                    <span class="text-textMuted">Frais de service</span>
                    <span>0,00 €</span>
                </div>
                <div class="flex justify-between font-extrabold text-xl text-textDark pt-2">
                    <span>Total</span>
                    <span class="text-brand">16,40 €</span>
                </div>
            </div>
        </section>

    </main>

    <!-- Bouton Valider (Fixed Bottom) -->
    <div class="fixed bottom-0 w-full bg-white p-6 rounded-t-4xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-20">
        <button class="w-full h-14 bg-brand text-white rounded-2xl font-bold text-lg shadow-soft transform transition hover:-translate-y-1 hover:shadow-lg active:scale-95" onclick="window.location.href='orders.html'">
            Valider la commande
        </button>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
